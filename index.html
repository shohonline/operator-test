<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Povodlar bo'yicha test</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; color: #333; }
        .container { width: 100%; max-width: 500px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; text-align: center; margin-top: 20px; }
        h2 { color: #2c3e50; margin-top: 0; }
        .mode-selection { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; font-size: 0.95rem; font-weight: bold; border: 2px solid #bdc3c7; border-radius: 8px; background-color: #ecf0f1; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { background-color: #9b59b6; color: white; border-color: #8e44ad; }
        .setup-group { margin-bottom: 15px; text-align: left; }
        .setup-group label { display: block; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; }
        .setup-input { width: 100%; padding: 10px; font-size: 1rem; border: 2px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; }
        .lang-container { display: flex; justify-content: space-between; margin-top: 5px; }
        .lang-btn { flex: 1; background-color: #ecf0f1; border: 2px solid #bdc3c7; padding: 10px; font-size: 1rem; margin: 0 5px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .lang-btn.active { background-color: #3498db; color: white; border-color: #2980b9; }
        .stats-header { display: flex; justify-content: space-between; font-size: 0.9rem; color: #7f8c8d; align-items: center; margin-bottom: 5px; }
        .timer-badge { background-color: #e74c3c; color: white; padding: 3px 10px; border-radius: 12px; font-weight: bold; }
        .progress-bar { width: 100%; background-color: #e0e0e0; border-radius: 8px; margin: 10px 0 20px 0; height: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background-color: #3498db; transition: width 0.3s; }
        .question-box { font-size: 1.15rem; font-weight: 600; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; background: #ecf0f1; padding: 15px; border-radius: 8px; border-left: 5px solid #3498db; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .option-btn { background-color: #ffffff; border: 2px solid #34495e; color: #34495e; padding: 15px; font-size: 1.25rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .option-btn:hover { background-color: #34495e; color: white; }
        .option-btn:active { transform: scale(0.98); }

        .btn { background-color: #2ecc71; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .stats-table th, .stats-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .stats-table th { background-color: #34495e; color: white; }
        .row-correct { background-color: #d4edda !important; color: #155724; }
        .row-wrong { background-color: #f8d7da !important; color: #721c24; }
        .badge { padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .badge-uz { background-color: #3498db; color: white; }
        .badge-ru { background-color: #e67e22; color: white; }
        .badge-info { font-size: 0.85rem; color: #7f8c8d; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Povodlar bo'yicha test</h2>
        <div id="setup-zone">
            <div class="setup-group">
                <label>Test rejimi:</label>
                <div class="mode-selection">
                    <button class="mode-btn active" id="btn-doimiy" onclick="setTestMode('DOIMIY')">Doimiy povodlar</button>
                    <button class="mode-btn" id="btn-umumiy" onclick="setTestMode('UMUMIY')">Umumiy povodlar</button>
                </div>
            </div>
            <div class="setup-group">
                <label>Savollar soni:</label>
                <input type="number" id="setup-questions" class="setup-input" value="20" min="1">
                <span id="available-questions-info" class="badge-info">Yuklanmoqda...</span>
            </div>
            <div class="setup-group">
                <label>Vaqt cheklovi (soniya):</label>
                <input type="number" id="setup-timer" class="setup-input" value="20" min="5">
            </div>
            <div class="setup-group">
                <label>Savol tili:</label>
                <div class="lang-container">
                    <button class="lang-btn" onclick="setLangMode('UZ', this)">UZ</button>
                    <button class="lang-btn" onclick="setLangMode('RU', this)">RU</button>
                    <button class="lang-btn active" onclick="setLangMode('MIX', this)">MIX (2 UZ / 1 RU)</button>
                </div>
            </div>
            <button onclick="startGame()" class="btn" style="background-color: #3498db; margin-top: 15px;">Boshlash 🎮</button>
        </div>
        
        <div id="game-zone" style="display: none;">
            <div class="stats-header">
                <span id="q-counter">Savol: 1/1</span>
                <span id="timer" class="timer-badge">Vaqt: 20s</span>
                <span id="score-counter">To'g'ri: 0</span>
            </div>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
            <div id="question" class="question-box">Yuklanmoqda...</div>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="result-zone" style="display: none;">
            <h3>Imtihon Yakunlandi!</h3>
            <p id="final-score" style="font-weight: bold;"></p>
            <div style="max-height: 400px; overflow-y: auto;">
                <table class="stats-table">
                    <thead><tr><th>Savol</th><th>Tanlovlar</th><th>Javobingiz</th><th>To'g'ri</th></tr></thead>
                    <tbody id="stats-body"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" class="btn" style="margin-top: 15px; background-color: #3498db;">Qayta boshlash ↻</button>
        </div>
    </div>

    <script>
        const rawPovods = [ /* ... (Sizning to'liq ma'lumotlar bazangiz shu yerda) ... */ ];
        const doimiyList = [ /* ... (Sizning doimiy ro'yxatingiz) ... */ ];
        
        let currentActiveMode = 'DOIMIY';
        let questionsQueue = [], currentQuestionIndex = 0, userAnswersLog = [], score = 0;
        let userQuestionsLimit = 20, userTimeLimit = 20, selectedLangMode = 'MIX', timerInterval = null, timeLeft = 20;

        // ... (Qolgan funksiyalaringiz: setTestMode, updateAvailableCount, etc. o'zgarishsiz)

        function generateOptions(correctAnswer) {
            let options = [String(correctAnswer)];
            let activePool = getActivePool();
            let allNums = activePool.map(item => String(item.num));

            while(options.length < 4) {
                let randomNum = allNums[Math.floor(Math.random() * allNums.length)];
                if(!options.includes(String(randomNum))) {
                    options.push(String(randomNum));
                }
            }
            return shuffleArray(options);
        }

        function selectOption(selectedVal) {
            clearInterval(timerInterval);
            document.querySelectorAll('.option-btn').forEach(btn => btn.blur()); 
            
            const currentQ = questionsQueue[currentQuestionIndex];
            const isCorrect = String(selectedVal) === String(currentQ.num);
            
            userAnswersLog.push({ 
                text: currentQ.text, lang: currentQ.lang, options: currentQ.optionsList,
                userAnswer: selectedVal, correctAnswer: currentQ.num, status: isCorrect 
            });

            if (isCorrect) score++;
            else if (currentQ.repeatCount === 0) {
                currentQ.repeatCount = 1;
                questionsQueue.splice(currentQuestionIndex + 4, 0, currentQ);
            }
            currentQuestionIndex++; showQuestion();
        }
        // ... (Qolgan kod qismlari)
    </script>
</body>
</html>
