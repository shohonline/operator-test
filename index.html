<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Operator Testi</title>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        .control { margin-bottom: 15px; }
        select, button { width: 100%; padding: 10px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Sozlamalar</h3>
        <div class="control">
            <label>Savollar soni:</label>
            <select id="q-count">
                <option value="10">10 ta</option>
                <option value="20">20 ta</option>
                <option value="30">30 ta</option>
            </select>
        </div>
        <div class="control">
            <label>Taymer (sekund):</label>
            <select id="q-timer">
                <option value="30">30 soniya</option>
                <option value="60">60 soniya</option>
            </select>
        </div>
        <button onclick="startApp()">Boshlash</button>
    </div>

    <script>
        // Baza
        const database = [
            { id: "97", uz: "Qasd odam o'ldirish", ru: "Umyshlennoe ubiystvo" },
            { id: "98", uz: "Ruhiy hayajon", ru: "Dushevnoye volnenie" },
            { id: "99", uz: "Chaqaloq o'ldirish", ru: "Detoubiystvo" },
            { id: "103", uz: "O'zini o'ldirish", ru: "Samoubiystvo" },
            { id: "266", uz: "Transport qoidasi", ru: "Pravila transporta" },
            { id: "277", uz: "Bezorilik", ru: "Huliganstvo" }
        ];

        function startApp() {
            const count = document.getElementById('q-count').value;
            const timer = document.getElementById('q-timer').value;
            
            // Bu yerda o'yin boshlanadi
            alert("Test boshlandi! Savollar: " + count + ", Taymer: " + timer + " sek.");
        }
    </script>
</body>
</html>
