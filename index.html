<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Operator Imtihoni</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f7f6; }
        .box { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .control { margin: 15px 0; }
        select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; }
        button { background: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        #game-area { display: none; }
    </style>
</head>
<body>
    <div class="box" id="setup-area">
        <h3>Sozlamalar</h3>
        <div class="control">
            <label>Savollar soni:</label>
            <select id="q-count">
                <option value="10">10 ta</option>
                <option value="20">20 ta</option>
            </select>
        </div>
        <div class="control">
            <label>Taymer (sek):</label>
            <select id="q-timer">
                <option value="30">30</option>
                <option value="60">60</option>
            </select>
        </div>
        <button onclick="startTest()">TESTNI BOSHLASH</button>
    </div>

    <div class="box" id="game-area">
        <h2 id="timer-display">00:00</h2>
        <p id="question-text"></p>
        <button onclick="location.reload()">Chiqish</button>
    </div>

    <script>
        // Baza (Sizdagi 181 ta ma'lumotni shu yerga joylashtiring)
        const database = [
            { uz: "Qasd odam o'ldirish", ru: "Umyshlennoe ubiystvo" },
            { uz: "Bezorilik", ru: "Huliganstvo" }
        ];

        function startTest() {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            const time = document.getElementById('q-timer').value;
            document.getElementById('timer-display').innerText = "Vaqt: " + time + "s";
            document.getElementById('question-text').innerText = "Test boshlandi, savol: " + database[0].uz;
        }
    </script>
</body>
</html>
